name: Auto Release Notes

on:
  release:
    types:
      - created
  workflow_dispatch:


permissions:
  contents: write

jobs:
  install-setup-copilot:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Copilot CLI
        uses: actions/setup-copilot@v0
        with:
          version: "latest"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Copilot CLI installation
        run: copilot --version

      - name: Prepare Release Context
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_TARGET: ${{ github.event.release.target_commitish }}
          COPILOT_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: bash .github/scripts/release/01_prepare_context.sh

      - name: Build Change Summary
        run: bash .github/scripts/release/02_build_change_summary.sh

      - name: Generate Release Notes
        run: bash .github/scripts/release/03_generate_release_notes.sh

      - name: Generate Release Title
        env:
          COPILOT_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: bash .github/scripts/release/04_generate_release_title.sh

      - name: Update Release
        run: bash .github/scripts/release/05_update_release.sh
