name: Auto Release Notes

on:
  release:
    types:
      - created
  workflow_dispatch:


permissions:
  contents: write

jobs:
  install-setup-copilot:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Copilot CLI
        uses: actions/setup-copilot@v0
        with:
          version: "latest"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Copilot CLI installation
        run: copilot --version

      - name: GH Release Notes
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_TARGET: ${{ github.event.release.target_commitish }}
        run: bash .github/scripts/gh-release-notes.sh
