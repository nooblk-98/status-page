name: Copilot Commit Message Rewriter

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: copilot-commit-rewriter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rewrite-commit-message:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rewrite weak/simple commit message and push
        env:
          COPILOT_TOKEN: ${{ secrets.COPILOT_PAT }}
          COMMIT_USER_NAME: ${{ vars.COMMIT_USER_NAME }}
          COMMIT_USER_EMAIL: ${{ secrets.COMMIT_USER_EMAIL }}
        run: python3 .github/scripts/commit/rewrite_commit_message.py
