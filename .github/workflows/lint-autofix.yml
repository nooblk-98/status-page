name: Lint & Auto-Fix PR

# Runs on every push except auto-fix branches (prevents infinite loops)
on:
  push:
    branches-ignore:
      - "auto-fix/**"

jobs:
  lint-and-fix:
    name: ESLint Bug Detection & Auto-Fix
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use a PAT or the default token; fetch full history for PR base comparison
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint auto-fix
        # continue-on-error so the job proceeds even when lint errors exist
        run: |
          npx eslint . \
            --ext .js \
            --fix \
            --ignore-pattern "node_modules/" \
            --ignore-pattern "*.min.js" \
            --format stylish \
            --output-file eslint-report.txt || true
        continue-on-error: true

      - name: Generate ESLint report (no fix — for PR description)
        id: lint_report
        run: |
          # Capture violations that could NOT be auto-fixed
          REPORT=$(npx eslint . \
            --ext .js \
            --ignore-pattern "node_modules/" \
            --ignore-pattern "*.min.js" \
            --format compact 2>&1 || true)
          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check for auto-fixed changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create auto-fix pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: auto-fix ESLint issues detected on push"
          author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          branch: auto-fix/eslint-${{ github.ref_name }}-${{ github.run_id }}
          delete-branch: true
          title: "🤖 Copilot Auto-Fix: ESLint issues on `${{ github.ref_name }}`"
          body: |
            ## Automated ESLint Fix

            This pull request was created automatically by the **Lint & Auto-Fix** workflow after detecting fixable issues in the push to `${{ github.ref_name }}`.

            ### What was fixed
            ESLint ran with `--fix` and corrected all auto-fixable violations (formatting, `var` → `const`/`let`, eqeqeq, etc.).

            ### Remaining issues (require manual attention)
            ```
            ${{ steps.lint_report.outputs.report }}
            ```

            > **Tip:** Enable [GitHub Copilot Autofix](https://docs.github.com/en/code-security/code-scanning/managing-code-scanning-alerts/responsible-use-autofix-for-codeql) on this repo so that CodeQL security findings also get Copilot-generated fix suggestions automatically.

            ---
            *Triggered by push `${{ github.sha }}` on branch `${{ github.ref_name }}`*
          labels: |
            bug
            auto-fix
            copilot
